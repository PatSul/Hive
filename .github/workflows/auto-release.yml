name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'hive/**'

permissions:
  contents: write

jobs:
  version-and-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          echo "tag=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $latest"

      - name: Bump patch version
        id: bump
        run: |
          tag="${{ steps.latest_tag.outputs.tag }}"
          # Strip 'v' prefix
          version="${tag#v}"
          # Split into parts
          major=$(echo "$version" | cut -d. -f1)
          minor=$(echo "$version" | cut -d. -f2)
          patch=$(echo "$version" | cut -d. -f3)
          # Bump patch
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          new_tag="v$new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Bumping $tag -> $new_tag"

      - name: Update Cargo.toml versions
        run: |
          new_version="${{ steps.bump.outputs.version }}"
          for toml in hive/crates/*/Cargo.toml; do
            sed -i "s/^version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"$new_version\"/" "$toml"
          done
          echo "Updated all crate versions to $new_version"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hive/crates/*/Cargo.toml
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
            git push
          fi

      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"
          echo "Created and pushed tag ${{ steps.bump.outputs.tag }}"

  # Build the cross-platform binaries and publish the GitHub Release in this same
  # run via a reusable-workflow call. A reusable call runs in this run's context
  # using the built-in GITHUB_TOKEN, so it needs no RELEASE_PAT. The old approach
  # POSTed a workflow dispatch with a PAT; when that PAT expired the Release
  # workflow silently stopped firing (tags advanced but no releases published).
  release:
    needs: version-and-tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.version-and-tag.outputs.tag }}
    permissions:
      contents: write
    secrets: inherit
