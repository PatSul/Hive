name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libxdo-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            hive -> target

      - name: Verify MVP slice (Windows)
        if: runner.os == 'Windows'
        working-directory: hive
        run: .\verify.bat

      - name: Verify MVP slice (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: hive
        run: bash ./verify.sh
