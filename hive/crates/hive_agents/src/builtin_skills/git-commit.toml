[skill]
name = "git-commit"
description = "Stage and commit changes with an AI-generated message"
version = "1.0.0"
category = "custom"
author = "hivecode"
source = "builtin"
enabled = true

[requirements]
capabilities = ["tool_use"]
preferred = ["structured_output"]
min_tier = "budget"

[prompt]
template = "Stage and commit changes with an AI-generated message."
tool_use_hint = "Use shell commands to run git diff, git add, and git commit."

[tools]
required = ["read_file"]
optional = ["search_files"]
