[skill]
name = "test-gen"
description = "Generate unit tests for the specified code"
version = "1.0.0"
category = "testing"
author = "hivecode"
source = "builtin"
enabled = true

[requirements]
capabilities = ["tool_use"]
preferred = ["extended_thinking"]
min_tier = "mid"

[prompt]
template = "Generate unit tests for the specified code."
tool_use_hint = "Use read_file to examine the code under test and search_files to find existing test patterns."

[tools]
required = ["read_file"]
optional = ["search_files", "write_file"]
