[skill]
name = "code-review"
description = "Review code for bugs, security, and improvements"
version = "1.0.0"
category = "code_generation"
author = "hivecode"
source = "builtin"
enabled = true

[requirements]
capabilities = ["tool_use"]
preferred = ["extended_thinking", "long_context"]
min_tier = "mid"

[prompt]
template = "Analyze code for bugs, security issues, and improvements."
tool_use_hint = "Use read_file to examine the code and search_files to find related code."
structured_output_hint = "Return findings as JSON with severity (critical/warning/info), file, line, and description."

[tools]
required = ["read_file"]
optional = ["search_files", "list_directory"]
